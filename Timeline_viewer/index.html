<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="onboarding-intro" aria-live="polite">
          <p class="eyebrow">Timeline Viewer</p>
          <h1 class="title">Загрузите папку с событиями</h1>
          <p class="subtitle">
            Поддерживается выбор папки, drag-and-drop и быстрый просмотр фото/видео по таймлайну.
          </p>
        </div>
        <div class="actions">
          <button id="pick-folder" class="btn" type="button">Выбрать папку</button>
          <input id="folder-input" type="file" webkitdirectory directory multiple hidden />
        </div>
      </header>

      <section id="drop-zone" class="drop-zone" aria-label="Drop folder">
        <div class="drop-content">
          <strong>Перетащите папку сюда</strong>
          <span>или выберите через кнопку выше</span>
        </div>
      </section>

      <section id="filter-bar" class="filter-bar" aria-label="Tag filters"></section>

      <section class="timeline-shell" aria-label="Timeline">
        <div id="timeline-scroll" class="timeline-scroll">
          <div id="timeline" class="timeline"></div>
        </div>
      </section>
      <div
        id="panel-splitter"
        class="panel-splitter"
        role="separator"
        aria-orientation="horizontal"
        aria-label="Resize panels"
      ></div>

      <section id="media-panel" class="media-panel" aria-label="Media viewer">
        <div id="media-title" class="media-title"></div>
        <div id="media-grid" class="media-grid"></div>
      </section>
    </main>

    <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true">
      <button id="viewer-close" class="viewer-close" type="button" aria-label="Close">×</button>
      <button id="viewer-prev" class="viewer-nav prev" type="button" aria-label="Previous">‹</button>
      <div id="viewer-stage" class="viewer-stage"></div>
      <button id="viewer-next" class="viewer-nav next" type="button" aria-label="Next">›</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
